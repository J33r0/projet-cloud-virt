services:
  redis:
    image: redis:7.0
    volumes: 
      - redis-data:/data
    container_name: redis-project
    ports:
      - "6379:6379" # map host port to container port
    restart: unless-stopped

  minio:
    image: quay.io/minio/minio
    container_name: minio-project
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # S3 API port
      - "9001:9001" # Web console port
    volumes:
      - minio-data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    restart: unless-stopped

  api:
    build: ./api
    container_name: api-project
    command: uv run --no-dev gunicorn --workers 4 --bind 0.0.0.0:8080 image_api.web:app
    ports:
      - "8080:8080" # map host port to container port
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET_NAME: images
    depends_on:
      - redis # ensure redis starts before api
      - minio # ensure minio starts before api
    restart: unless-stopped # restart the api service if it crashes

  worker:
    build: ./api
    container_name: worker-project
    command: uv run --no-dev celery --app image_api.worker.app worker
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET_NAME: images
    depends_on:
      - redis # ensure redis starts before worker
      - minio # ensure minio starts before worker
    restart: unless-stopped # restart the worker service if it crashes

  frontend:
    build: ./web
    container_name: frontend-project
    command: npm run start
    ports:
      - "3000:3000" # map host port to container port
    depends_on:
      - api # ensure api starts before frontend
    restart: unless-stopped

volumes:
  redis-data:
  minio-data:
