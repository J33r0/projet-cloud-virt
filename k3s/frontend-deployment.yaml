apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: cloud-virt
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: frontend
          image: ghcr.io/j33r0/projet-cloud-virt/web:latest
          command: ["npm", "run", "start"]
          ports:
            - containerPort: 3000
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          # Mount the config.json from the ConfigMap so the frontend
          volumeMounts:
            - name: frontend-config
              mountPath: /app/dist/config.json
              subPath: config.json
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: frontend-config
          configMap:
            name: frontend-config