apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: cloud-virt
  labels:
    app: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret

      containers:
        - name: worker
          image: ghcr.io/j33r0/projet-cloud-virt/api:latest
          command: ["uv", "run", "--no-dev", "celery", "--app", "image_api.worker.app", "worker", "--loglevel=info"]
          envFrom:
            - secretRef:
                name: app-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"