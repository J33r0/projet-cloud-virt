# The following secrets must exist in the cluster:
#
# Secret: app-secrets
#   CELERY_BROKER_URL
#   S3_ENDPOINT_URL
#   AWS_REGION_NAME
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#   S3_BUCKET_NAME
#
# If you are pulling the images from a private GitHub Container Registry, you also need:
#   GITHUB_PAT
#
# Secret: ghcr-pull-secret
#   type: kubernetes.io/dockerconfigjson